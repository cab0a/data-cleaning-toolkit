name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Check CLI installation
        run: |
          data-cleaning-toolkit --version
          data-cleaning-toolkit --help
          data-cleaning-toolkit suggest-schema --help

      - name: Run tests
        run: python -m pytest

      - name: Reproduce reference results
        run: python examples/run_demo.py

      - name: Verify committed reference results
        run: git diff --exit-code -- results/
