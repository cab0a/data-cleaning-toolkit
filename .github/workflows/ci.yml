name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Check CLI installation
        run: |
          data-cleaning-toolkit --version
          data-cleaning-toolkit --help
          data-cleaning-toolkit suggest-schema --help

      - name: Check public Python API example
        run: python examples/public_api_demo.py

      - name: Run tests
        run: python -m pytest

      - name: Reproduce reference results
        run: python examples/run_demo.py

      - name: Verify reference checksums
        run: python examples/run_demo.py --verify-only

      - name: Verify committed reference results
        run: git diff --exit-code -- results/

  distribution:
    name: Distribution package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -m pip check

      - name: Check installed distribution
        run: |
          test "$(data-cleaning-toolkit --version)" = "1.0.0"
          python examples/public_api_demo.py
          python -c "from importlib.resources import files; assert files('data_cleaning_toolkit').joinpath('py.typed').is_file()"
